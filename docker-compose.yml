# ============================================================
#  ChronoGest - Docker Compose Base (PostgreSQL 16)
#  Este archivo define la estructura mínima compartida.
#  En desarrollo se usa junto con docker-compose.override.yml
#  En producción se usa docker-compose.prod.yml
# ============================================================

services:
  db:
    image: postgres:16
    container_name: chronogest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alejo.v02
      POSTGRES_DB: sena_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronogest_net

  redis:
    image: redis:7-alpine
    container_name: chronogest_redis
    restart: unless-stopped
    networks:
      - chronogest_net

  backend:
    container_name: chronogest_backend
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
      - FACE_SERVICE_URL=http://face-service:5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB2_HOST=db
      - DB2_PORT=5432
      - REDIS_HOST=redis
      - TENANT_DB_USER=postgres
      - TENANT_DB_PASSWORD=alejo.v02
      - TENANT_MAX_POOLS=20
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      face-service:
        condition: service_started
    networks:
      - chronogest_net

  face-service:
    container_name: chronogest_face_service
    restart: unless-stopped
    environment:
      - TZ=America/Bogota
    volumes:
      - face_photos:/app/photos
      - deepface_models:/root/.deepface
    networks:
      - chronogest_net

  frontend:
    container_name: chronogest_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - face-service
    networks:
      - chronogest_net
    profiles:
      - full

networks:
  chronogest_net:
    driver: bridge

volumes:
  db_data:
  uploads_data:
  backend_modules:
  frontend_modules:
  redis_data:
  face_photos:
  deepface_models:
