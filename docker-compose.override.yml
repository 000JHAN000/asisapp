# ============================================================
#  ChronoGest - Docker Compose Override (Desarrollo)
#  Extiende docker-compose.yml con overrides para dev local
# ============================================================
# Uso:
#   docker compose up -d              # usa docker-compose.yml + override
#   docker compose -f docker-compose.yml up -d   # solo base, sin override
# ============================================================

services:
  db:
    ports:
      - "5440:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./Asistencia-Backend
      dockerfile: Dockerfile
      target: dev
    command: npx --yes nest start --watch
    env_file: ./Asistencia-Backend/.env
    environment:
      - TZ=America/Bogota
      - FACE_SERVICE_URL=http://face-service:5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB2_HOST=db
      - DB2_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TENANT_DB_USER=postgres
      - TENANT_DB_PASSWORD=alejo.v02
      - TENANT_MAX_POOLS=20
    ports:
      - "3001:3001"
    volumes:
      - ./Asistencia-Backend:/app
      - backend_modules:/app/node_modules
      - ./Asistencia-Backend/uploads:/app/uploads

  face-service:
    build:
      context: ./python-face-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - face_photos:/app/photos
      - deepface_models:/root/.deepface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    profiles:
      - full
