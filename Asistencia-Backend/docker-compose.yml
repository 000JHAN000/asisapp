# ============================================================
#  ChronoGest - Docker Compose (PostgreSQL 16)
# ============================================================

services:
  db:
    image: postgres:16
    container_name: chronogest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: alejo.v02
      POSTGRES_DB: sena_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronogest_net

  redis:
    image: redis:7-alpine
    container_name: chronogest_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - chronogest_net

  backend:
    build:
      context: ./Asistencia-Backend
      dockerfile: Dockerfile
      target: dev
    container_name: chronogest_backend
    restart: unless-stopped
    env_file: ./Asistencia-Backend/.env
    environment:
      - TZ=America/Bogota
    ports:
      - "3001:3001"
    volumes:
      - ./Asistencia-Backend:/app
      - backend_modules:/app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - chronogest_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: chronogest_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - chronogest_net
    profiles:
      - full

networks:
  chronogest_net:
    driver: bridge

volumes:
  db_data:
  uploads_data:
  backend_modules:
  frontend_modules:
  redis_data:
